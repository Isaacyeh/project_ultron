<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Void Arena — Multiplayer</title>

  <!-- Babylon.js core + loaders -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babylonjs/6.26.0/babylon.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babylonjs-loaders/6.26.0/babylonjs.loaders.min.js"></script>

  <!-- Socket.IO (served by the Node server) -->
  <script src="/socket.io/socket.io.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ── HUD overlay ─────────────────────────────────────────────────── -->
  <div id="hud">
    <div id="hud-top">
      <div id="player-info">
        <span id="player-name">Player</span>
        <div id="health-bar-wrap">
          <div id="health-bar"></div>
          <span id="health-label">100</span>
        </div>
      </div>
      <div id="player-count">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
        <span id="online-count">1</span> online
      </div>
    </div>

    <div id="hud-bottom">
      <div id="controls-hint">
        <span>WASD · Move</span>
        <span>↑↓←→ / Mouse · Camera</span>
        <span>Shift · Run</span>
      </div>

      <div id="chat-panel">
        <div id="chat-log"></div>
        <div id="chat-input-row">
          <input id="chat-input" type="text" placeholder="Press Enter to chat…" maxlength="200" />
        </div>
      </div>
    </div>
  </div>

  <!-- ── Loading screen ──────────────────────────────────────────────── -->
  <div id="loading-screen">
    <div id="loading-inner">
      <div id="loading-logo">VOID ARENA</div>
      <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
      <div id="loading-msg">Initializing engine…</div>
    </div>
  </div>

  <!-- ── Canvas ──────────────────────────────────────────────────────── -->
  <canvas id="renderCanvas"></canvas>

  <!-- ── Game scripts ────────────────────────────────────────────────── -->
  <script src="render.js"></script>
  <script src="script.js"></script>
</body>
</html>
